services:
  postgres:
    image: postgres:16
    container_name: tournament-postgres
    environment:
      POSTGRES_USER: tournament
      POSTGRES_PASSWORD: tournament
      POSTGRES_DB: tournament
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: tournament-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
